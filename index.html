<!DOCTYPE html>
<html>
<head>
<title>Ahmed Mobile Parts Store</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

/* Header */
.header {
  background: #ff6600;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* Banner */
.banner {
  background: white;
  padding: 30px;
  text-align: center;
}

.banner h1 {
  font-size: 26px;
}

.banner span {
  color: #ff6600;
}

/* Products */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 15px;
  padding: 20px;
}

.product {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.product img {
  width: 100%;
  height: 160px;
  object-fit: contain;
}

.price {
  color: #ff6600;
  font-weight: bold;
}

.whatsapp-btn {
  background: green;
  color: white;
  padding: 8px 14px;
  text-decoration: none;
  border-radius: 6px;
}

</style>

</head>

<body>

<div class="header">
Ahmed Mobile Parts Store
</div>

<span>MOBILE PARTS</span>

href="https://wa.me/923444264653">

</div>

</html>
